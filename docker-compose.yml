# Herald — root docker-compose
#
# The build context for each service is the repository root so each
# Dockerfile can COPY from both the service's own directory and shared/.
#
# Both services mount the same ./data directory. SQLite WAL mode handles
# concurrent access.

services:
  herald-bot:
    build:
      context: .
      dockerfile: herald-bot/Dockerfile
    container_name: herald-bot
    restart: unless-stopped
    env_file: ./herald-bot/.env
    volumes:
      - ./data:/app/data

  herald-web:
    build:
      context: .
      dockerfile: herald-web/Dockerfile
    container_name: herald-web
    restart: unless-stopped
    env_file: ./herald-web/.env
    ports:
      - "8088:8088"
    volumes:
      - ./data:/app/data
    depends_on:
      - herald-bot
